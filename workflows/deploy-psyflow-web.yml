name: Deploy psyflow-web

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "psyflow-web/**"
      - "H*/**"
      - ".github/workflows/deploy-psyflow-web.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: psyflow-web/package-lock.json

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        working-directory: psyflow-web
        run: npm ci

      - name: Build static site
        working-directory: psyflow-web
        env:
          PSYFLOW_BASE: /${{ github.event.repository.name }}/
        run: npm run build:pages

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: psyflow-web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
